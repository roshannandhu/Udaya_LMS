name: Keep Render backend awake

# Pings the Render health endpoint on a schedule so the free-tier dyno never
# idles into a cold start. Render sleeps a free web service after ~15 minutes of
# no traffic; a request every ~10 minutes keeps it warm so logins are instant.
#
# Notes:
# - GitHub's scheduled runs are best-effort and can be delayed a few minutes
#   under load, so 10 min (vs Render's 15 min idle window) leaves safety margin.
# - The job retries a few times because the very first ping after an idle period
#   may itself be the cold-start request (slow), and we don't want a flaky miss
#   to look like an outage.

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes (UTC)
  workflow_dispatch: {}        # allow manual runs from the Actions tab

# If a previous run is still going, don't pile up.
concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /api/health
        run: |
          URL="https://udaya-lms.onrender.com/api/health"
          for i in 1 2 3 4; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 70 "$URL" || echo "000")
            echo "Attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Backend is awake."
              exit 0
            fi
            sleep 20
          done
          # Don't fail the workflow on a transient miss — the next scheduled run
          # retries, and a hard failure would just spam failure notifications.
          echo "::warning::Health check did not return 200 after retries (will retry next run)."
          exit 0
