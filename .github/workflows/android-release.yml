name: Android release

# Ship a new app version by pushing a tag, e.g.:
#   git tag v1.1.0 && git push origin v1.1.0
# This builds the web app, syncs Capacitor, builds + SIGNS a release APK, and
# uploads the APK + version.json to the Cloudflare R2 public bucket so the branded
# download page (/app) and the in-app updater pick it up automatically.
#
# Required GitHub repo secrets:
#   ANDROID_KEYSTORE_BASE64    base64 of udaya-release.keystore  (`base64 -w0 udaya-release.keystore`)
#   ANDROID_KEYSTORE_PASSWORD  keystore store password
#   ANDROID_KEY_ALIAS          key alias
#   ANDROID_KEY_PASSWORD       key password
#   R2_ACCOUNT_ID              Cloudflare account id (for the S3 endpoint)
#   R2_ACCESS_KEY_ID           R2 access key
#   R2_SECRET_ACCESS_KEY       R2 secret key
#   R2_PUBLIC_BUCKET           R2 public bucket name (e.g. udaya-public)
#   R2_PUBLIC_BASE_URL         e.g. https://files.udaya-learn.com (no trailing slash)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # for the optional GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 24 to match the known-good local/Cloudflare build. The first runs
          # used Node 20, where a dependency requiring Node > 20 made `vite build`
          # fail (it builds cleanly on 24). Also clears the Node-20 deprecation.
          node-version: '24'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Derive version
        id: ver
        run: |
          NAME="${GITHUB_REF_NAME#v}"          # v1.1.0 -> 1.1.0
          CODE="$((100 + GITHUB_RUN_NUMBER))"   # monotonic, always > the old literal (10)
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "Building versionName=$NAME versionCode=$CODE"

      - name: Build web + sync Capacitor
        working-directory: frontend
        run: |
          node -v && npm -v
          # --include=dev forces devDependencies (incl. @capacitor/cli) to install
          # even if the runner sets NODE_ENV=production. Call the local cap binary
          # directly rather than via npx (which failed the first run).
          npm ci --include=dev || npm install --include=dev
          npm run build
          ./node_modules/.bin/cap sync android

      - name: Decode keystore
        run: |
          # Strip any CR/LF/spaces the stored secret may carry (the base64 was set
          # from a CRLF text file) BEFORE decoding, so the keystore bytes are exact —
          # a corrupt keystore is what makes Gradle signing fail in CI.
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '\r\n ' | base64 -d > "$RUNNER_TEMP/udaya-release.keystore"
          echo "keystore bytes: $(stat -c%s "$RUNNER_TEMP/udaya-release.keystore")"
          # Verify it's readable with the provided credentials before the build.
          keytool -list -keystore "$RUNNER_TEMP/udaya-release.keystore" \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" -alias "${{ secrets.ANDROID_KEY_ALIAS }}"

      - name: Build signed release APK
        working-directory: frontend/android
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/udaya-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          # -x lintVitalRelease: skip the release lint pass (can fail CI-only on
          # warnings-as-errors; not needed to produce a signed APK). --stacktrace so
          # any real failure shows the cause in the log.
          ./gradlew assembleRelease -x lintVitalRelease --stacktrace \
            -PversionName=${{ steps.ver.outputs.name }} \
            -PversionCode=${{ steps.ver.outputs.code }}

      - name: Stage artifacts
        id: stage
        run: |
          APK_SRC="frontend/android/app/build/outputs/apk/release/app-release.apk"
          test -f "$APK_SRC" || { echo "APK not found at $APK_SRC"; exit 1; }
          mkdir -p out
          APK_NAME="udaya-${{ steps.ver.outputs.name }}.apk"
          cp "$APK_SRC" "out/$APK_NAME"
          cp "$APK_SRC" "out/udaya-latest.apk"
          SIZE=$(stat -c%s "$APK_SRC")
          cat > out/version.json <<JSON
          {
            "versionCode": ${{ steps.ver.outputs.code }},
            "versionName": "${{ steps.ver.outputs.name }}",
            "apkUrl": "${{ secrets.R2_PUBLIC_BASE_URL }}/app/$APK_NAME",
            "apkLatestUrl": "${{ secrets.R2_PUBLIC_BASE_URL }}/app/udaya-latest.apk",
            "sizeBytes": $SIZE,
            "minVersionCode": 0,
            "notes": "Version ${{ steps.ver.outputs.name }} is now available.",
            "releasedAt": "${{ github.event.repository.updated_at }}"
          }
          JSON
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          cat out/version.json

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          BUCKET: ${{ secrets.R2_PUBLIC_BUCKET }}
        run: |
          APK="${{ steps.stage.outputs.apk_name }}"
          aws s3 cp "out/$APK" "s3://$BUCKET/app/$APK" \
            --endpoint-url "$ENDPOINT" --content-type application/vnd.android.package-archive
          aws s3 cp "out/udaya-latest.apk" "s3://$BUCKET/app/udaya-latest.apk" \
            --endpoint-url "$ENDPOINT" --content-type application/vnd.android.package-archive
          aws s3 cp "out/version.json" "s3://$BUCKET/app/version.json" \
            --endpoint-url "$ENDPOINT" --content-type application/json --cache-control "no-cache"

      - name: Create GitHub Release (archive)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/${{ steps.stage.outputs.apk_name }}
            out/version.json
          body: |
            Udaya app ${{ steps.ver.outputs.name }} (build ${{ steps.ver.outputs.code }})
            Download: ${{ secrets.R2_PUBLIC_BASE_URL }}/app/${{ steps.stage.outputs.apk_name }}
