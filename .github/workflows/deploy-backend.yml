name: Deploy backend to EC2

# Auto-deploys the FastAPI backend on push to main, mirroring how Cloudflare
# auto-deploys the frontend. Only runs when backend files change (path filter),
# so frontend-only commits don't redeploy the backend. It SSHes into the EC2 box
# and runs the existing /opt/udaya/deploy.sh (git pull + docker compose up --build).
#
# Requires these repo Secrets (Settings → Secrets and variables → Actions):
#   EC2_HOST     → the Elastic IP (e.g. 40.192.44.164)
#   EC2_USER     → ubuntu
#   EC2_SSH_KEY  → the PRIVATE key of a dedicated deploy keypair whose public key
#                  is in the box's ~/.ssh/authorized_keys
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {}   # allow manual "Run workflow" from the Actions tab

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 12m
          script: |
            bash /opt/udaya/deploy.sh
