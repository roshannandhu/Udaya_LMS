name: Deploy backend

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          R2_AK: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SK: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCT: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          test -n "${EC2_HOST:-}" || { echo "EC2_HOST secret is missing"; exit 1; }
          test -n "${EC2_USER:-}" || { echo "EC2_USER secret is missing"; exit 1; }
          test -n "${EC2_SSH_KEY:-}" || { echo "EC2_SSH_KEY secret is missing"; exit 1; }

          EC2_HOST="$(printf '%s' "$EC2_HOST" | tr -d '\r' | xargs)"
          EC2_USER="$(printf '%s' "$EC2_USER" | tr -d '\r' | xargs)"

          # Write the private key verbatim. The secret must be the full PEM
          # (-----BEGIN OPENSSH PRIVATE KEY----- … -----END … -----). No base64
          # decode/re-encode here — that only ever corrupts a valid key (it was
          # the cause of the persistent "not a valid private key" failures).
          install -m 700 -d ~/.ssh
          KEY_FILE=~/.ssh/udaya_ec2_key
          printf '%s\n' "$EC2_SSH_KEY" | tr -d '\r' > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          ssh-keygen -y -f "$KEY_FILE" >/dev/null 2>&1 || {
            echo "EC2_SSH_KEY is not a valid private key. Paste the ENTIRE .pem";
            echo "(private key, all lines incl. BEGIN/END) into the secret — not the .pub.";
            exit 1;
          }

          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Sync R2 credentials from GitHub Secrets into the box's backend/.env.
          # Passes values via stdin (not args) so they never appear in process list.
          # Uses R2_ACCESS_KEY / R2_SECRET_KEY names that storage.py checks first.
          if [ -n "${R2_AK:-}" ] && [ -n "${R2_SK:-}" ]; then
            printf 'R2_ACCESS_KEY=%s\nR2_SECRET_KEY=%s\n' "$R2_AK" "$R2_SK" \
              | ssh -i "$KEY_FILE" -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" \
                  'while IFS= read -r line; do
                     key="${line%%=*}"
                     if grep -q "^${key}=" /opt/udaya/backend/.env 2>/dev/null; then
                       sed -i "s|^${key}=.*|${line}|" /opt/udaya/backend/.env
                     else
                       echo "$line" >> /opt/udaya/backend/.env
                     fi
                   done
                   echo "R2 credentials synced to backend/.env"'
          else
            echo "R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY secrets not set — skipping credential sync"
          fi

          # Stash any drift on the box so a fast-forward pull always applies.
          # The health check retries: containers need a few seconds to boot, so a
          # single immediate curl (exit 56) must not fail an otherwise-good deploy.
          ssh -i "$KEY_FILE" -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" \
            'cd /opt/udaya && (git stash --include-untracked || true) && git pull --ff-only && docker compose up -d --build && docker image prune -f && echo "--- health ---" && for i in 1 2 3 4 5 6; do curl -sf http://127.0.0.1:8001/api/health && break || { echo "waiting for api ($i)…"; sleep 5; }; done'
