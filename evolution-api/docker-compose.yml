version: '3.3'

services:
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - DOCKER_ENV=true
      - LOG_LEVEL=error
      - AUTHENTICATION_API_KEY=my-super-secret-global-key-123
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_EXPOSE_IN_REQ=true
    volumes:
      - evolution_store:/evolution/store
      - evolution_instances:/evolution/instances

  evolution-manager:
    image: atendai/evolution-manager:latest
    container_name: evolution-manager
    ports:
      - "8081:80"
    environment:
      - EVOLUTION_API_ENDPOINT=http://evolution-api:8080

volumes:
  evolution_store:
  evolution_instances:
