<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a1a" />
    <!-- Apply an explicit dark choice BEFORE first paint so it never flashes light
         (FOUC). Default is LIGHT — only a saved 'dark' goes dark. Mirrors
         initialDark() in src/lib/theme.js. -->
    <script>
      (function () {
        try {
          if (localStorage.getItem('tutoria-theme') === 'dark') {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          }
        } catch (e) {}
      })();
    </script>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Warm the connection to Zoom's CDN so the live-class SDK download starts instantly -->
    <link rel="preconnect" href="https://source.zoom.us" crossorigin />
    <link rel="dns-prefetch" href="https://source.zoom.us" />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Zoom Client-View CSS. Pinned to 3.13.2 to match ZOOM_VERSION in
         ZoomMeetingView.jsx — 6.x CSS 403s on Zoom's CDN (CORB-blocked) and the
         meeting renders blank/unstyled. Keep this version in sync with the component. -->
    <link type="text/css" rel="stylesheet" href="https://source.zoom.us/3.13.2/css/bootstrap.css" />
    <link type="text/css" rel="stylesheet" href="https://source.zoom.us/3.13.2/css/react-select.css" />
    <title>Udaya</title>
  </head>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="color:red; background:white; position:fixed; top:0; left:0; padding:20px; z-index:99999;"><b>Crash:</b> ' + e.message + '</div>';
      });
    </script>
    <div id="root"></div>
    <!-- Zoom Web SDK mounts here; kept outside React's virtual DOM to avoid conflicts -->
    <div id="zmmtg-root" style="display:none"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
